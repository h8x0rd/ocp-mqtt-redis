apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-a-queue-scaler
spec:
  triggers:
    - type: redis
      metadata:
        address: redis.mqtt-demo-prod.svc.cluster.local:6379
        listName: queue:broker-a
        listLength: "10"
        activationListLength: "1"
---
