apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: broker-a-queue-scaler
spec:
  triggers:
    - type: redis
      metadata:
        address: redis.mqtt-demo-test.svc.cluster.local:6379
        listName: queue:broker-a
        listLength: "10"
