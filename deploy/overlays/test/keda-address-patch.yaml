apiVersion: keda.sh/v1alpha1
kind: ScaledJob
metadata:
  name: worker-a-jobs
spec:
  triggers:
    - type: redis
      metadata:
        address: redis.mqtt-demo-test.svc.cluster.local:6379
        listName: queue:broker-a
        listLength: '5'
        activationListLength: '20'
