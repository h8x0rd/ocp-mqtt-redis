apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: mqtt-demo-test
resources:
  - ../../base
commonAnnotations:
  demo.environment: test
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: redis://redis.mqtt-demo-test.svc.cluster.local:6379
  - target:
      group: keda.sh
      version: v1alpha1
      kind: ScaledJob
      name: worker-a-jobs
    patch: |-
      - op: replace
        path: /spec/jobTargetRef/template/spec/containers/0/env/3/value
        value: redis://redis.mqtt-demo-test.svc.cluster.local:6379
      - op: replace
        path: /spec/triggers/0/metadata/address
        value: redis.mqtt-demo-test.svc.cluster.local:6379
      - op: replace
        path: /spec/triggers/0/metadata/activationListLength
        value: "10"
  - target:
      group: keda.sh
      version: v1alpha1
      kind: ScaledJob
      name: worker-b-jobs
    patch: |-
      - op: replace
        path: /spec/jobTargetRef/template/spec/containers/0/env/3/value
        value: redis://redis.mqtt-demo-test.svc.cluster.local:6379
      - op: replace
        path: /spec/triggers/0/metadata/address
        value: redis.mqtt-demo-test.svc.cluster.local:6379
      - op: replace
        path: /spec/triggers/0/metadata/activationListLength
        value: "10"
  - target:
      group: keda.sh
      version: v1alpha1
      kind: ScaledJob
      name: worker-c-jobs
    patch: |-
      - op: replace
        path: /spec/jobTargetRef/template/spec/containers/0/env/3/value
        value: redis://redis.mqtt-demo-test.svc.cluster.local:6379
      - op: replace
        path: /spec/triggers/0/metadata/address
        value: redis.mqtt-demo-test.svc.cluster.local:6379
      - op: replace
        path: /spec/triggers/0/metadata/activationListLength
        value: "10"
