apiVersion: v1
kind: ConfigMap
metadata:
  name: api-script
  labels:
    app: api
data:
  server.js: |
    const http = require('http');
    const net = require('net');
    const { URL } = require('url');

    const PORT = Number(process.env.PORT || 8080);
    const POD_NAMESPACE = process.env.POD_NAMESPACE || 'default';
    const REDIS_URL = process.env.REDIS_URL || `redis://redis.${POD_NAMESPACE}.svc.cluster.local:6379`;
    const BROKERS = (process.env.BROKERS || 'broker-a,broker-b,broker-c')
      .split(',')
      .map((s) => s.trim())
      .filter(Boolean);

    const redisUrl = new URL(REDIS_URL);
    const REDIS_HOST = redisUrl.hostname;
    const REDIS_PORT = Number(redisUrl.port || 6379);

    function parseRedisSimple(data) {
      const prefix = data[0];
      if (prefix === ':') return Number(data.slice(1).trim());
      if (prefix === '+') return data.slice(1).trim();
      if (prefix === '-') throw new Error(data.slice(1).trim());
      if (prefix === '$') {
        const parts = data.split('\r\n');
        const length = Number(parts[0].slice(1));
        if (length === -1) return null;
        return parts[1] || '';
      }
      if (prefix === '*') {
        const lines = data.split('\r\n').filter((line) => line.length > 0);
        const count = Number(lines[0].slice(1));
        const values = [];
        for (let i = 1; i < lines.length; i += 2) {
          if (values.length >= count) break;
          if (lines[i][0] === '$') values.push(lines[i + 1] || '');
        }
        return values;
      }
      return data.trim();
    }

    function redisCommand(args) {
      return new Promise((resolve, reject) => {
        const socket = net.createConnection({ host: REDIS_HOST, port: REDIS_PORT });
        let settled = false;
        let data = '';

        const done = (err, value) => {
          if (settled) return;
          settled = true;
          try { socket.end(); } catch (_) {}
          try { socket.destroy(); } catch (_) {}
          if (err) reject(err); else resolve(value);
        };

        socket.setTimeout(10000, () => done(new Error('Redis command timed out')));
        socket.on('error', (err) => done(err));
        socket.on('data', (chunk) => {
          data += chunk.toString('utf8');
          if (!data.endsWith('\r\n')) return;
          try {
            done(null, parseRedisSimple(data));
          } catch (error) {
            done(error);
          }
        });
        socket.on('connect', () => {
          const payload = `*${args.length}\r\n` + args.map((arg) => `$${Buffer.byteLength(String(arg))}\r\n${arg}\r\n`).join('');
          socket.write(payload);
        });
      });
    }

    async function getQueueCount(name) {
      return Number(await redisCommand(['LLEN', `queue:${name}`]));
    }

    async function getActiveWorkerCount(name) {
      const keys = await redisCommand(['KEYS', `worker:${name}:*`]);
      return Array.isArray(keys) ? keys.length : 0;
    }

    async function getProcessedCount(name) {
      const value = await redisCommand(['GET', `processed:${name}`]);
      return Number(value || 0);
    }

    async function purgeQueue(name) {
      const key = `queue:${name}`;
      const removed = Number(await redisCommand(['DEL', key]));
      const remaining = Number(await redisCommand(['LLEN', key]));
      return { removed, remaining };
    }

    async function pushQueueMessage(name, payload) {
      return Number(await redisCommand(['RPUSH', `queue:${name}`, payload]));
    }

    function json(res, status, body) {
      const payload = JSON.stringify(body);
      res.writeHead(status, {
        'Content-Type': 'application/json',
        'Content-Length': Buffer.byteLength(payload),
      });
      res.end(payload);
    }

    function readJson(req) {
      return new Promise((resolve, reject) => {
        let body = '';
        req.on('data', (chunk) => {
          body += chunk.toString('utf8');
          if (body.length > 1024 * 1024) {
            reject(new Error('Request body too large'));
            req.destroy();
          }
        });
        req.on('end', () => {
          try {
            resolve(body ? JSON.parse(body) : {});
          } catch (error) {
            reject(new Error('Invalid JSON body'));
          }
        });
        req.on('error', reject);
      });
    }

    function parseTargets(mode, broker, count) {
      const total = Math.max(1, Math.min(500, Number(count || 1)));
      const targetMode = String(mode || 'single');
      if (targetMode === 'all') {
        return BROKERS.flatMap((name) => Array.from({ length: total }, (_, i) => ({ broker: name, index: i + 1 })));
      }
      if (targetMode === 'round-robin') {
        return Array.from({ length: total }, (_, i) => ({ broker: BROKERS[i % BROKERS.length], index: i + 1 }));
      }
      if (!BROKERS.includes(broker)) {
        throw new Error('Unknown broker');
      }
      return Array.from({ length: total }, (_, i) => ({ broker, index: i + 1 }));
    }

    const server = http.createServer(async (req, res) => {
      try {
        const url = new URL(req.url, `http://${req.headers.host || 'localhost'}`);

        if (req.method === 'GET' && url.pathname === '/healthz') {
          return json(res, 200, { status: 'ok' });
        }

        if (req.method === 'GET' && url.pathname === '/readyz') {
          await redisCommand(['PING']);
          return json(res, 200, { status: 'ready' });
        }

        if (req.method === 'GET' && url.pathname === '/brokers') {
          const brokers = await Promise.all(
            BROKERS.map(async (name) => ({
              name,
              service: `${name}:1883`,
              queueCount: await getQueueCount(name),
              activeWorkers: await getActiveWorkerCount(name),
              processedCount: await getProcessedCount(name),
            }))
          );
          return json(res, 200, { brokers });
        }

        if (req.method === 'POST' && url.pathname === '/send') {
          const body = await readJson(req);
          const broker = body.broker;
          const count = Math.max(1, Math.min(500, Number(body.count || 1)));
          const message = String(body.message || 'Hello from OpenShift');
          const mode = String(body.mode || 'single');
          const jobs = parseTargets(mode, broker, count);
          const queuedByBroker = Object.fromEntries(BROKERS.map((name) => [name, 0]));

          for (const job of jobs) {
            const payload = `${message} #${job.index}`;
            await pushQueueMessage(job.broker, payload);
            queuedByBroker[job.broker] += 1;
          }

          return json(res, 200, {
            ok: true,
            mode,
            requestedCount: count,
            totalMessagesQueued: jobs.length,
            queuedByBroker,
          });
        }

        if (req.method === 'DELETE' && /^\/brokers\/[^/]+\/messages$/.test(url.pathname)) {
          const broker = decodeURIComponent(url.pathname.split('/')[2]);
          if (!BROKERS.includes(broker)) {
            return json(res, 400, { error: 'Unknown broker' });
          }
          const result = await purgeQueue(broker);
          return json(res, 200, { ok: true, broker, ...result });
        }

        return json(res, 404, { error: 'Not found' });
      } catch (error) {
        console.error(error);
        return json(res, 500, { error: error.message || 'Internal server error' });
      }
    });

    server.listen(PORT, '0.0.0.0', () => {
      console.log(`API listening on ${PORT}`);
    });
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: docker.io/node:20-alpine
          command: ['node', '/opt/app/server.js']
          env:
            - name: PORT
              value: '8080'
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: REDIS_URL
              value: redis://redis.default.svc.cluster.local:6379
            - name: BROKERS
              value: broker-a,broker-b,broker-c
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: api-script
              mountPath: /opt/app
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
      volumes:
        - name: api-script
          configMap:
            name: api-script
